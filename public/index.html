<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  body { margin: 0; }
  #office-app { font-family: system-ui, -apple-system, sans-serif; max-width: 1200px;
    margin: 0 auto; color: #1c1c1c; padding: 16px; }
  #office-app * { box-sizing: border-box; }
  .tabs { display: flex; gap: 4px; border-bottom: 2px solid #eee; margin-bottom: 16px; }
  .tab { padding: 12px 20px; cursor: pointer; border: none; background: none;
    font-size: 15px; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .tab.active { color: #1c1c1c; border-bottom-color: #5b4ddb; font-weight: 600; }
  .panel { display: none; }
  .panel.active { display: block; }

  .main-split { display: grid; grid-template-columns: 440px 1fr; gap: 18px; align-items: start; }
  @media (max-width: 900px) { .main-split { grid-template-columns: 1fr; } }

  #chat-log { border: 1px solid #e5e5e5; border-radius: 12px; padding: 18px;
    height: 82vh; min-height: 540px; overflow-y: auto; margin-bottom: 14px; background: #fafafa; }
  #history-log { border: 1px solid #e5e5e5; border-radius: 12px; padding: 18px;
    height: 72vh; min-height: 460px; overflow-y: auto; background: #fafafa; }
  .bubble { margin: 12px 0; line-height: 1.55; max-width: 92%; padding: 11px 15px;
    border-radius: 12px; white-space: pre-wrap; }
  .bubble.you { background: #5b4ddb; color: #fff; margin-left: auto; }
  .bubble.coo { background: #fff; border: 1px solid #e5e5e5; }
  .bubble.rnd { background: #faece7; border: 1px solid #f0c4b3; }
  .bubble.engineer { background: #e1f5ee; border: 1px solid #b3e0cf; }
  .bubble.marketing { background: #e6f1fb; border: 1px solid #b5d4f4; }
  .bubble .who { font-size: 11px; font-weight: 600; opacity: 0.8; display: block; margin-bottom: 3px; }
  .approve-box { background: #fffbe6; border: 1px solid #f0d98a; border-radius: 12px;
    padding: 14px; margin: 12px 0; }
  .approve-box .label { font-size: 12px; color: #8a6d1a; font-weight: 600; }
  .approve-box .task { font-size: 14px; margin: 6px 0 10px; }
  .approve-btn { background: #1c1c1c; color: #fff; border: none; border-radius: 8px;
    padding: 8px 16px; cursor: pointer; font-size: 14px; }
  .skip-btn { background: none; border: 1px solid #ccc; border-radius: 8px;
    padding: 8px 16px; cursor: pointer; font-size: 14px; margin-left: 8px; }
  .input-row { display: flex; gap: 8px; align-items: flex-end; max-width: 760px;
    margin: 0 auto; }
  #chat-box { flex: 1; padding: 14px; border: 1px solid #ccc; border-radius: 10px;
    font-size: 15px; resize: vertical; min-height: 92px; font-family: inherit; }
  .btn { padding: 14px 18px; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; }
  .btn-send { background: #1c1c1c; color: #fff; }
  .btn-mic { background: #eee; color: #1c1c1c; font-size: 18px; width: 52px; height: 52px; }
  .btn-mic.listening { background: #ff4d4d; color: #fff; }
  .btn:disabled { opacity: 0.5; cursor: default; }

  .office-grid { background: linear-gradient(#f4f3f8, #ecebf5); border-radius: 16px;
    padding: 20px; position: relative; overflow: hidden; position: sticky; top: 16px; }
  .desk { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 12px;
    text-align: center; transition: transform .25s, box-shadow .25s, border-color .25s; position: relative; }
  .desk.active { border-color: #5b4ddb; box-shadow: 0 6px 22px rgba(91,77,219,0.22); transform: translateY(-4px); }
  .avatar { width: 52px; height: 52px; border-radius: 50%; margin: 0 auto 8px;
    display: flex; align-items: center; justify-content: center; font-size: 24px; transition: transform .25s; }
  .desk.active .avatar { animation: bob .9s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  .desk .role { font-weight: 600; font-size: 14px; }
  .desk .sub { font-size: 11px; color: #888; }
  .desk .pill { display: inline-block; margin-top: 6px; font-size: 10px; padding: 3px 9px;
    border-radius: 99px; background: #eee; color: #666; }
  .desk.active .pill { background: #ede9ff; color: #5b4ddb; }
  .speech { position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    background: #1c1c1c; color: #fff; font-size: 10px; padding: 3px 9px; border-radius: 10px;
    white-space: nowrap; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .desk.active .speech { opacity: 1; }
  .team-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 26px; }
  .coo-wrap { display: flex; justify-content: center; }
  .arrow-down { text-align: center; color: #b0a8e0; font-size: 20px; margin: 6px 0; }
  .token { position: absolute; width: 13px; height: 13px; border-radius: 50%; background: #5b4ddb;
    opacity: 0; pointer-events: none; z-index: 5; }
  .note { font-size: 12px; color: #999; margin-top: 12px; text-align: center; }
  .day-head { font-size: 13px; font-weight: 600; color: #5b4ddb; margin: 22px 0 10px;
    text-align: center; }
  .day-head span { background: #ece9f6; padding: 4px 14px; border-radius: 99px; }
  .hist-bubble { max-width: 78%; margin: 8px 0; padding: 10px 14px; border-radius: 14px;
    font-size: 13px; line-height: 1.5; white-space: pre-wrap; clear: both; }
  .hist-bubble .hist-agent { font-weight: 600; font-size: 11px; display: block; margin-bottom: 3px; }
  .hist-bubble.owner { background: #5b4ddb; color: #fff; margin-left: auto; }
  .hist-bubble.coo { background: #ede9ff; border: 1px solid #cfc6f5; color: #2c2461; margin-right: auto; }
  .hist-bubble.rnd { background: #faece7; border: 1px solid #f0c4b3; color: #712b13; margin-right: auto; }
  .hist-bubble.engineer { background: #e1f5ee; border: 1px solid #b3e0cf; color: #085041; margin-right: auto; }
  .hist-bubble.marketing { background: #e6f1fb; border: 1px solid #b5d4f4; color: #0c447c; margin-right: auto; }
  .desk.coo-desk { border-top: 4px solid #5b4ddb; }
  .desk.rnd-desk { border-top: 4px solid #d85a30; }
  .desk.engineer-desk { border-top: 4px solid #1d9e75; }
  .desk.marketing-desk { border-top: 4px solid #378add; }
  .refresh-btn { background: none; border: 1px solid #ccc; border-radius: 8px;
    padding: 6px 12px; cursor: pointer; font-size: 13px; margin-bottom: 10px; }
  @keyframes type { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-1.5px);} }
  @keyframes typearm { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-1px);} }
  @keyframes lean { 0%,100%{transform:translateX(0);} 50%{transform:translateX(2px);} }
  @keyframes paint { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-1px);} }
  @keyframes step { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-1.5px);} }
</style>
</head>
<body>
<div id="lock-screen" style="max-width:360px;margin:80px auto;font-family:system-ui,sans-serif;text-align:center;">
  <div style="font-size:40px;margin-bottom:8px;">&#128274;</div>
  <h2 style="font-weight:600;">Command Center</h2>
  <p style="color:#888;font-size:14px;">Enter the password to continue.</p>
  <input id="pw-box" type="password" placeholder="Password"
    style="width:100%;padding:12px;border:1px solid #ccc;border-radius:10px;font-size:15px;margin-bottom:10px;display:block;" />
  <button id="pw-go" style="width:100%;padding:12px;border:none;border-radius:10px;background:#1c1c1c;color:#fff;font-size:15px;cursor:pointer;display:block;">Enter</button>
  <div id="pw-error" style="color:#d33;font-size:13px;margin-top:10px;height:16px;"></div>
</div>

<div id="office-app" style="display:none;">
  <div class="tabs">
    <button class="tab active" data-panel="main">Command Center</button>
    <button class="tab" data-panel="history">History</button>
  </div>

  <div class="panel active" id="panel-main">
    <div class="main-split">
      <div class="office-grid" id="office-grid">
        <svg id="stage" viewBox="0 0 330 240" style="width:100%;height:auto;display:block;border-radius:10px;border:3px solid #6f573a;" shape-rendering="crispEdges"></svg>
        <div class="note">Your team works here as you chat.</div>
      </div>

      <div>
        <div id="chat-log"></div>
        <div class="input-row">
          <button class="btn btn-mic" id="mic" title="Click and speak">&#127908;</button>
          <textarea id="chat-box" rows="3" placeholder="Give your COO a goal..."></textarea>
          <button class="btn btn-send" id="send">Send</button>
        </div>
        <div class="note" id="mic-note"></div>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-history">
    <button class="refresh-btn" id="hist-refresh">&#8635; Refresh history</button>
    <div id="history-log"><div class="note">Loading history...</div></div>
  </div>
</div>

<script>
(function () {
  const SERVER_URL = window.location.origin;
  let PORTAL_PASSWORD = "";

  const lockScreen = document.getElementById("lock-screen");
  const pwBox = document.getElementById("pw-box");
  const pwGo = document.getElementById("pw-go");
  const pwError = document.getElementById("pw-error");
  const appEl = document.getElementById("office-app");

  async function tryUnlock() {
    const pw = pwBox.value;
    if (!pw) return;
    pwError.textContent = "Checking...";
    try {
      const res = await fetch(SERVER_URL + "/coo", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pw, message: "__unlock_check__" })
      });
      if (res.status === 401) { pwError.textContent = "Wrong password."; return; }
      PORTAL_PASSWORD = pw;
      lockScreen.style.display = "none";
      appEl.style.display = "block";
      startApp();
    } catch (e) { pwError.textContent = "Could not reach the server."; }
  }
  pwGo.addEventListener("click", tryUnlock);
  pwBox.addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });

  function startApp() {
    const app = document.getElementById("office-app");
    const tabs = app.querySelectorAll(".tab");
    tabs.forEach(t => t.addEventListener("click", () => {
      tabs.forEach(x => x.classList.remove("active"));
      app.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      t.classList.add("active");
      app.querySelector("#panel-" + t.dataset.panel).classList.add("active");
      if (t.dataset.panel === "history") loadHistory();
    }));

    const log = app.querySelector("#chat-log");
    const box = app.querySelector("#chat-box");
    const send = app.querySelector("#send");
    const names = { coo: "COO", rnd: "R&D", engineer: "Engineer", marketing: "Marketing" };

    // ---- Pixel office scene (final) ----
    const NS = "http://www.w3.org/2000/svg";
    const stage = app.querySelector("#stage");
    const shirts = { coo:"#7f77dd", rnd:"#e06a2c", engineer:"#1d9e75", marketing:"#3b8bd4" };
    const homes = { coo:[50,118] };
    const deskSpot = { rnd:[250,52], engineer:[250,130], marketing:[250,208] };
    const HALL_X = 190;

    function px(p,x,y,w,h,f){ const r=document.createElementNS(NS,"rect");
      r.setAttribute("x",x);r.setAttribute("y",y);r.setAttribute("width",w);r.setAttribute("height",h);
      r.setAttribute("fill",f);p.appendChild(r);return r; }
    function stxt(p,x,y,s,f,c){ const t=document.createElementNS(NS,"text");
      t.setAttribute("x",x);t.setAttribute("y",y);t.setAttribute("font-size",s);
      t.setAttribute("text-anchor","middle");t.setAttribute("fill",c||"#fff");
      t.setAttribute("font-family",'"Press Start 2P", monospace');t.textContent=f;p.appendChild(t);return t; }

    function buildOffice(){
      px(stage,0,0,330,240,"#d8c4a0");
      for(let y=0;y<240;y+=16){ px(stage,0,y,330,16,(y/16)%2?"#d4bf99":"#dac6a4"); px(stage,0,y+15,330,1,"#c7b38c"); }
      for(let y=0;y<240;y+=16){ const off=((y/16)%2)?40:0; for(let x=off;x<330;x+=80) px(stage,x,y,1,15,"#c7b38c"); }
      px(stage,8,8,110,150,"#0000000f");
      px(stage,8,8,110,5,"#4a5a7a");px(stage,8,8,5,150,"#4a5a7a");px(stage,8,153,110,5,"#4a5a7a");
      px(stage,113,8,5,55,"#4a5a7a");px(stage,113,103,5,55,"#4a5a7a");
      stxt(stage,52,21,5,"COO","#4a5a7a");
      px(stage,35,55,46,18,"#8a6a44");px(stage,35,73,46,5,"#6b4f30");
      px(stage,47,40,22,14,"#2f3540");px(stage,50,43,16,8,"#7fd4ff");
      cubicle(238,12,"R&D","#b8552a");
      cubicle(238,90,"ENG","#157a58");
      cubicle(238,168,"MKT","#2a6ba8");
      ["rnd","engineer","marketing"].forEach(deskItems);
      guy("coo",homes.coo[0],homes.coo[1]);
      ["rnd","engineer","marketing"].forEach(id=>{ const s=deskSpot[id]; guy(id,s[0]+14,s[1]); });
    }
    function cubicle(x,y,label,color){
      px(stage,x,y,86,4,"#9c8a6c"); px(stage,x+82,y,4,66,"#9c8a6c"); px(stage,x,y+62,86,4,"#9c8a6c");
      px(stage,x,y,4,24,"#9c8a6c"); px(stage,x,y+42,4,24,"#9c8a6c");
      stxt(stage,x+48,y+15,5,label,color);
      px(stage,x+38,y+30,34,16,"#8a6a44"); px(stage,x+38,y+46,34,4,"#6b4f30");
    }
    function deskItems(id){
      const [dx,dy]=deskSpot[id];
      const g=document.createElementNS(NS,"g"); g.setAttribute("id","deskitem-"+id);
      if(id==="rnd"){ px(g,dx-12,dy-14,18,11,"#2f3540"); px(g,dx-10,dy-12,14,7,"#7fd4ff");
        const kb=document.createElementNS(NS,"g"); kb.setAttribute("id","kb-rnd");
        px(kb,dx-12,dy-1,18,5,"#555"); for(let i=0;i<5;i++)px(kb,dx-10+i*4,dy,2,2,"#ccc"); g.appendChild(kb); }
      if(id==="engineer"){ const bp=document.createElementNS(NS,"g"); bp.setAttribute("id","bp-eng");
        px(bp,dx-13,dy-6,26,16,"#2a5db0"); px(bp,dx-10,dy-3,20,1,"#9fc4ff"); px(bp,dx-10,dy,12,1,"#9fc4ff");
        px(bp,dx-10,dy+3,16,1,"#9fc4ff"); px(bp,dx-10,dy+6,8,1,"#9fc4ff"); g.appendChild(bp); }
      if(id==="marketing"){ const po=document.createElementNS(NS,"g"); po.setAttribute("id","po-mkt");
        px(po,dx-11,dy-8,22,18,"#fff"); g.appendChild(po); }
      stage.appendChild(g);
    }
    function guy(id,x,y){
      const g=document.createElementNS(NS,"g"); g.setAttribute("id","guy-"+id);
      g.setAttribute("transform","translate("+x+" "+y+")");
      const body=document.createElementNS(NS,"g"); body.setAttribute("id","body-"+id);
      px(body,-5,-22,10,7,"#6b4a2a"); px(body,-5,-16,10,5,"#e8c39a");
      px(body,-3,-15,2,2,"#222");px(body,1,-15,2,2,"#222");
      px(body,-6,-11,12,11,shirts[id]); px(body,-6,-11,3,11,"#00000022");
      px(body,-8,-10,2,8,shirts[id]);
      const arm=px(body,6,-10,2,8,shirts[id]); arm.setAttribute("id","arm-"+id);
      px(body,-5,0,4,5,"#33405a");px(body,1,0,4,5,"#33405a");
      const ph=document.createElementNS(NS,"g"); ph.setAttribute("id","phone-"+id); ph.style.opacity="0";
      px(ph,7,-18,4,7,"#222"); px(ph,8,-17,2,4,"#7fd4ff"); body.appendChild(ph);
      g.appendChild(body); stage.appendChild(g);
    }
    function pos(id){ const t=document.getElementById("guy-"+id).getAttribute("transform").match(/-?[\d.]+/g); return [parseFloat(t[0]),parseFloat(t[1])]; }
    function phone(id,on){ document.getElementById("phone-"+id).style.opacity=on?"1":"0";
      document.getElementById("arm-"+id).setAttribute("y",on?"-18":"-10"); }
    let posterTimer=null;
    function fillPoster(){ const [dx,dy]=deskSpot.marketing; let n=0; const colors=["#e06a2c","#2a6ba8","#157a58"];
      posterTimer=setInterval(()=>{ if(n>8){clearInterval(posterTimer);return;}
        px(document.getElementById("po-mkt"),dx-9+(n%3)*6,dy-6+Math.floor(n/3)*5,5,4,colors[n%3]); n++; },300); }
    function clearPoster(){ if(posterTimer)clearInterval(posterTimer);
      const po=document.getElementById("po-mkt"); if(po){ while(po.children.length>1)po.removeChild(po.lastChild); } }
    function workLoop(id,on){
      const body=document.getElementById("body-"+id);
      if(on){
        if(id==="rnd") body.style.animation="typearm .28s ease-in-out infinite";
        if(id==="engineer") body.style.animation="lean .9s ease-in-out infinite";
        if(id==="marketing"){ body.style.animation="paint .5s ease-in-out infinite"; clearPoster(); fillPoster(); }
      } else { body.style.animation=""; }
    }
    function walk(id,x,y){
      return new Promise(res=>{
        const [cx,cy]=pos(id); const dist=Math.abs(x-cx)+Math.abs(y-cy);
        const dur=Math.max(350,dist*15);
        const g=document.getElementById("guy-"+id); const body=document.getElementById("body-"+id);
        const start=performance.now(); body.style.animation="step .26s ease-in-out infinite";
        function frame(now){ const p=Math.min(1,(now-start)/dur);
          g.setAttribute("transform","translate("+(cx+(x-cx)*p)+" "+(cy+(y-cy)*p)+")");
          if(p<1) requestAnimationFrame(frame); else { body.style.animation=""; res(); } }
        requestAnimationFrame(frame);
      });
    }
    function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

    buildOffice();

    // COO walks from wherever it is to the worker. No text bubbles.
    async function animSend(who){
      await walk("coo",HALL_X,pos("coo")[1]);
      await walk("coo",HALL_X,deskSpot[who][1]);
      await walk("coo",deskSpot[who][0]-22,deskSpot[who][1]);
      workLoop(who,true);
    }
    // Worker finishes; COO raises phone to call owner, then stays on the floor.
    async function animReturn(who){
      workLoop(who,false);
      phone("coo",true);
      await wait(1600);
      phone("coo",false);
    }
    // When the whole turn is idle again, send COO home (called after delegation ends).
    async function cooGoHome(){
      const [cx,cy]=pos("coo");
      if(Math.abs(cx-homes.coo[0])<6 && Math.abs(cy-homes.coo[1])<6) return;
      await walk("coo",HALL_X,cy);
      await walk("coo",HALL_X,homes.coo[1]);
      await walk("coo",homes.coo[0],homes.coo[1]);
    }
    function cooThinking(on){ /* no bubble; COO just waits at desk */ }

    function add(text, who) {
      const d = document.createElement("div");
      d.className = "bubble " + who;
      const label = who === "you" ? "You" : (names[who] || who);
      d.innerHTML = '<span class="who">' + label + '</span>';
      d.appendChild(document.createTextNode(text));
      log.appendChild(d);
      log.scrollTop = log.scrollHeight;
      return d;
    }

    function showApproval(delegation) {
      const wrap = document.createElement("div");
      wrap.className = "approve-box";
      wrap.innerHTML =
        '<div class="label">COO proposes &#8594; ' + (names[delegation.to] || delegation.to) + '</div>' +
        '<div class="task"></div>';
      wrap.querySelector(".task").textContent = delegation.task;
      const approve = document.createElement("button");
      approve.className = "approve-btn"; approve.textContent = "Approve";
      const skip = document.createElement("button");
      skip.className = "skip-btn"; skip.textContent = "Not now";
      wrap.appendChild(approve); wrap.appendChild(skip);
      log.appendChild(wrap);
      log.scrollTop = log.scrollHeight;
      approve.addEventListener("click", async () => { wrap.remove(); await runApproval(delegation); });
      skip.addEventListener("click", () => { wrap.remove(); });
    }

    async function runApproval(delegation) {
      send.disabled = true;
      await animSend(delegation.to);
      const ph = add(names[delegation.to] + " is working...", delegation.to);
      try {
        const res = await fetch(SERVER_URL + "/approve", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: PORTAL_PASSWORD, to: delegation.to, task: delegation.task })
        });
        const data = await res.json();
        await animReturn(delegation.to);
        ph.remove();
        if (data.error) { add(data.error, "coo"); await cooGoHome(); }
        else {
          add(data.workerReply, delegation.to);
          add(data.cooReply, "coo");
          if (data.delegation) showApproval(data.delegation);
          else await cooGoHome();
        }
      } catch (e) { await animReturn(delegation.to); ph.remove(); add("Something went wrong running that step.", "coo"); await cooGoHome(); }
      send.disabled = false;
    }

    async function ask() {
      const message = box.value.trim();
      if (!message) return;
      add(message, "you");
      box.value = "";
      send.disabled = true;
      cooThinking(true);
      const ph = add("COO is thinking...", "coo");
      try {
        const res = await fetch(SERVER_URL + "/coo", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: PORTAL_PASSWORD, message })
        });
        const data = await res.json();
        cooThinking(false);
        ph.remove();
        add(data.reply || data.error || "No response.", "coo");
        if (data.delegation) showApproval(data.delegation);
      } catch (e) { cooThinking(false); ph.remove(); add("Could not reach the server.", "coo"); }
      send.disabled = false;
    }

    send.addEventListener("click", ask);
    box.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); ask(); }
    });

    const mic = app.querySelector("#mic");
    const micNote = app.querySelector("#mic-note");
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { mic.disabled = true; micNote.textContent = "Voice input needs Chrome."; }
    else {
      const recog = new SR();
      recog.lang = "en-US"; recog.interimResults = false;
      let listening = false;
      mic.addEventListener("click", () => { if (listening) { recog.stop(); return; } recog.start(); });
      recog.onstart = () => { listening = true; mic.classList.add("listening");
        micNote.textContent = "Listening... click the mic again to stop."; };
      recog.onend = () => { listening = false; mic.classList.remove("listening"); micNote.textContent = ""; };
      recog.onerror = () => { micNote.textContent = "Didn't catch that. Try again."; };
      recog.onresult = (ev) => { box.value = ev.results[0][0].transcript; ask(); };
    }

    async function loadHistory() {
      const hist = app.querySelector("#history-log");
      hist.innerHTML = '<div class="note">Loading...</div>';
      try {
        const res = await fetch(SERVER_URL + "/memory?password=" + encodeURIComponent(PORTAL_PASSWORD));
        const data = await res.json();
        const items = (data.history || []);
        if (!items.length) { hist.innerHTML = '<div class="note">No history yet.</div>'; return; }
        const byDay = {};
        items.forEach(it => {
          const day = (it.time || "").slice(0, 10) || "Earlier";
          (byDay[day] = byDay[day] || []).push(it);
        });
        hist.innerHTML = "";
        Object.keys(byDay).sort().reverse().forEach(day => {
          const h = document.createElement("div");
          h.className = "day-head";
          h.innerHTML = '<span></span>';
          h.querySelector("span").textContent = day;
          hist.appendChild(h);
          byDay[day].forEach(it => {
            // If the owner spoke, show their message as its own right-side bubble first.
            if (it.user) {
              const ob = document.createElement("div");
              ob.className = "hist-bubble owner";
              ob.innerHTML = '<span class="hist-agent">You</span>';
              ob.appendChild(document.createTextNode(it.user));
              hist.appendChild(ob);
            }
            const agent = it.agent || "coo";
            const body = it.text || it.coo || "";
            if (body) {
              const row = document.createElement("div");
              row.className = "hist-bubble " + agent;
              row.innerHTML = '<span class="hist-agent">' + (names[agent] || agent) + '</span>';
              row.appendChild(document.createTextNode(body));
              hist.appendChild(row);
            }
          });
        });
      } catch (e) { hist.innerHTML = '<div class="note">Could not load history.</div>'; }
    }
    app.querySelector("#hist-refresh").addEventListener("click", loadHistory);

    add("Hi - I'm your COO. Give me a goal, like \"find a product we could sell to dog owners,\" and I'll put the team to work.", "coo");
  }
})();
</script>
</body>
</html>
